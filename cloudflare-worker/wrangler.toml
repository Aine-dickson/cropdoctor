name = "coffe-clinic-edge-proxy"
main = "dashboard-worker.js"
compatibility_date = "2026-04-14"

[vars]
# Set these in the Cloudflare dashboard or via wrangler secret put.
# PLANT_ID_KEY = ""
# ANTHROPIC_API_KEY = ""
# SUPABASE_URL = ""
# SUPABASE_SERVICE_ROLE_KEY = ""
# RESEND_API_KEY = ""
# EMAIL_FROM = "CropDoctor <no-reply@your-domain.com>"
# ADMIN_PORTAL_URL = "https://cropdoctor.bitpulse.dev/admin"
# NOTIFICATION_DISPATCH_TOKEN = ""

# Recommended deployment steps:
# 1. wrangler secret put PLANT_ID_KEY
# 2. wrangler secret put ANTHROPIC_API_KEY
# 3. wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# 4. wrangler secret put RESEND_API_KEY
# 5. wrangler secret put NOTIFICATION_DISPATCH_TOKEN
# 6. wrangler deploy
